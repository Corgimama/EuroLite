<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer – Eurovision</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 1024px)">
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <script src="app.js"></script>
  <script>guardPage('viewer');</script>
</head>
<body>
  <div class="header-area">
    <h1>Голосование зрителя</h1>
    <div id="viewerStatus" class="status"></div>
  </div>
  
  <div class="vote-controls-sticky" id="voteControls" style="display:none;">
    <input type="text" id="viewerName" placeholder="Ваше имя">
    <button id="sendBtn" disabled>Отправить</button>
  </div>
  
  <div class="main-area">
    <div id="stageRelax" class="stage-container" style="display:none;">
      <div id="finalTableContainer"></div>
      <button id="downloadImgBtn" style="margin-top:10px;">Скачать как картинку</button>
    </div>
    
    <div id="stagePreparing" class="stage-container" style="display:none;">
      <div style="text-align: center; padding: 40px; font-size: 1.2rem; color: #555;">
        Голосование скоро начнётся
      </div>
    </div>
    
     <div id="stageVoting" style="display:none;">
      <div class="viewer-panel">
        <div class="score-board" id="scoreBoardContainer"></div>
        <div class="participants-box" id="participantsBox"></div>
      </div>
    </div>
  </div>
  <script src="viewer.js"></script>
  <script src="html2canvas.min.js"></script>
</body>
</html>
